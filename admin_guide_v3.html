<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEG Global · 行政指引手册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --brand:#4f46e5;--brand-bg:#eef2ff;--brand-border:#c7d2fe;
  --text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --border:#e2e8f0;--bg:#f8f9fa;--white:#fff;
  --sidebar-w:272px;
}
body{background:var(--bg);font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;color:var(--text);min-height:100vh;display:flex}

/* ── Sidebar ── */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sb-logo{padding:22px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:11px}
.sb-logo-icon{width:40px;height:40px;background:var(--brand);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white;flex-shrink:0;box-shadow:0 5px 14px rgba(79,70,229,.28)}
.sb-logo-text h1{font-size:1em;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.sb-logo-text p{font-size:.62em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-top:2px}
.sb-lang{padding:10px 14px;border-bottom:1px solid #f1f5f9;display:flex;gap:6px}
.lang-btn{flex:1;padding:7px;border-radius:10px;font-size:.78em;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text-3);transition:all .15s;letter-spacing:.04em}
.lang-btn.active{background:var(--brand-bg);color:var(--brand);border-color:var(--brand-border)}
.lang-btn:hover:not(.active){background:#f8fafc;color:var(--text-2)}
.sb-search{padding:12px 14px;border-bottom:1px solid #f1f5f9}
.sb-search-wrap{position:relative}
.sb-search-wrap input{width:100%;padding:8px 12px 8px 34px;background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;font-size:.82em;outline:none;color:var(--text);transition:all .18s}
.sb-search-wrap input:focus{background:var(--white);border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.sb-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-3)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:11px;font-size:.84em;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#f8fafc;color:var(--text)}
.nav-item.active{background:var(--brand-bg);color:var(--brand)}
.nav-item .ni-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.nav-item .ni-text{flex:1}
.nav-item .ni-arrow{font-size:10px;opacity:0;color:var(--brand)}
.nav-item.active .ni-arrow{opacity:1}
.sb-footer{padding:14px;border-top:1px solid #f1f5f9}
.sb-footer-box{background:#f8fafc;border-radius:12px;padding:13px 14px}
.sb-footer-box .sf-title{font-size:.67em;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.sb-footer-box .sf-body{font-size:.74em;color:var(--text-2);line-height:1.6}

/* ── Main ── */
.main{margin-left:var(--sidebar-w);flex:1;overflow-y:auto;min-height:100vh}
.content{max-width:780px;padding:44px 44px 80px;margin:0 auto}

/* ── Page Header ── */
.page-hd{margin-bottom:44px}
.page-hd-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.page-hd-icon{width:50px;height:50px;background:var(--white);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-shrink:0}
.page-hd h2{font-size:1.9em;font-weight:900;letter-spacing:-.04em;line-height:1.2}
.page-hd-bar{width:40px;height:3px;background:var(--brand);border-radius:3px;margin-top:2px}

/* ── Welcome banner ── */
.welcome-banner{background:linear-gradient(135deg,#eef2ff 0%,#f0fdf4 100%);border:1px solid var(--brand-border);border-radius:18px;padding:22px 26px;margin-bottom:28px}
.wb-title{font-size:1.05em;font-weight:800;color:var(--brand);margin-bottom:6px}
.wb-desc{font-size:.83em;color:var(--text-2);line-height:1.8}

/* ── Scenario block ── */
.scenario-block{background:var(--white);border-radius:20px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:18px}
.sb-question{padding:16px 22px;background:var(--brand-bg);border-bottom:1px solid var(--brand-border);display:flex;align-items:center;gap:10px}
.sb-q-icon{font-size:18px;flex-shrink:0}
.sb-q-text{font-weight:800;font-size:.92em;color:#3730a3;line-height:1.4}
.sb-answer{padding:18px 22px}
.sb-tip{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:11px;padding:11px 14px;margin-bottom:14px;font-size:.81em;color:#166534;line-height:1.7;white-space:pre-wrap}
.sb-tip-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:11px;padding:11px 14px;margin-bottom:14px;font-size:.81em;color:#92400e;line-height:1.7;white-space:pre-wrap}

/* ── Step list ── */
.step-list{list-style:none;margin-bottom:14px}
.step-item{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:.83em;color:var(--text-2);line-height:1.6}
.step-item:last-child{border-bottom:none}
.step-num{width:22px;height:22px;background:var(--brand);color:white;border-radius:50%;font-size:.72em;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-body{flex:1}
.step-body strong{color:var(--text);font-weight:700}
.step-body a{color:var(--brand);text-decoration:none;font-weight:600}
.step-body a:hover{text-decoration:underline}

/* ── Block ── */
.block{margin-bottom:28px}
.block-label{display:flex;align-items:center;gap:7px;font-size:.7em;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}

/* ── Contact card ── */
.contact-card{background:var(--white);padding:18px 22px;border-radius:16px;border:1px solid var(--border);margin-bottom:9px;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:box-shadow .2s}
.contact-card:hover{box-shadow:0 4px 18px rgba(79,70,229,.09)}
.cc-name{font-weight:800;color:var(--brand);font-size:.88em;margin-bottom:5px}
.cc-desc{font-size:.81em;color:var(--text-2);line-height:1.65;white-space:pre-wrap}

/* ── Links grid ── */
.links-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:580px){.links-grid{grid-template-columns:1fr}}
.link-card{display:flex;align-items:center;justify-content:space-between;background:var(--white);padding:13px 16px;border-radius:13px;border:1px solid var(--border);text-decoration:none;color:var(--text);font-size:.82em;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.03);transition:all .16s;gap:8px}
.link-card:hover{border-color:var(--brand-border);background:rgba(79,70,229,.03);color:var(--brand);box-shadow:0 3px 14px rgba(79,70,229,.09)}
.link-card .lc-text{flex:1;line-height:1.35}
.link-card .lc-arr{font-size:11px;color:var(--text-3);transition:all .16s;flex-shrink:0}
.link-card:hover .lc-arr{color:var(--brand);transform:translateX(2px)}
.link-card-full{grid-column:1/-1}

/* ── Text-only item ── */
.text-item{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;border-radius:11px;background:#f8fafc;border:1px solid var(--border);font-size:.81em;color:var(--text-2);line-height:1.6;margin-bottom:7px;white-space:pre-wrap}
.text-item .ti-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:5px}

/* ── Highlight link (企鹅岛) ── */
.highlight-link{display:flex;align-items:center;justify-content:space-between;background:var(--brand-bg);border:1.5px solid var(--brand-border);padding:14px 18px;border-radius:14px;text-decoration:none;color:var(--brand);font-size:.87em;font-weight:700;margin-bottom:14px;transition:all .16s;box-shadow:0 2px 10px rgba(79,70,229,.1)}
.highlight-link:hover{background:#e0e7ff;box-shadow:0 4px 18px rgba(79,70,229,.18)}
.hl-left{display:flex;align-items:center;gap:10px}
.hl-icon{font-size:20px}
.hl-text span:first-child{display:block;font-weight:800}
.hl-text span:last-child{display:block;font-size:.78em;color:#6366f1;font-weight:500;margin-top:1px}
.hl-arr{font-size:18px;color:var(--brand)}

/* ── Subsection ── */
.subsec{background:var(--white);border-radius:20px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:11px}
.subsec-hd{padding:16px 22px;border-bottom:1px solid #f1f5f9;background:#fafbfc;font-weight:800;font-size:.88em;color:var(--text)}
.subsec-body{padding:18px 22px}
.subsec-info{background:rgba(79,70,229,.05);border:1px solid rgba(79,70,229,.12);border-radius:12px;padding:12px 15px;margin-bottom:14px;font-size:.81em;color:#3730a3;line-height:1.7;white-space:pre-wrap}
.subsec-links{display:flex;flex-direction:column;gap:3px}
.sub-link{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-radius:10px;font-size:.81em;text-decoration:none;color:var(--text-2);font-weight:500;transition:all .14s}
.sub-link:hover{background:#f1f5f9;color:var(--text)}
.sub-link .sl-left{display:flex;align-items:center;gap:9px}
.sub-link .sl-dot{width:6px;height:6px;border-radius:50%;background:var(--brand-border);flex-shrink:0}
.sub-link .sl-ext{font-size:10px;color:var(--text-3)}
.sub-link:hover .sl-ext{color:var(--brand)}
.sub-text{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border-radius:10px;font-size:.81em;color:var(--text-2);line-height:1.55;white-space:pre-wrap}
.sub-text .sl-dot{width:6px;height:6px;border-radius:50%;background:#cbd5e1;flex-shrink:0;margin-top:4px}

/* ── Secretary footer card ── */
.secretary-card{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#fdf4ff 0%,#faf5ff 100%);border:1.5px solid #e9d5ff;border-radius:16px;padding:16px 20px;margin-top:28px}
/* ── Image card ── */
.img-pair{display:flex;gap:8px;margin:10px 0 14px}
.img-thumb{border-radius:10px;overflow:hidden;border:1px solid var(--border);flex:1;min-width:0}
.img-thumb img{display:block;width:100%;height:auto}
.secretary-icon{font-size:28px;flex-shrink:0}
.secretary-body{flex:1}
.secretary-title{font-weight:800;font-size:.88em;color:#7c3aed;margin-bottom:3px}
.secretary-desc{font-size:.78em;color:#6b7280;line-height:1.6}
.note-box{background:#fffbeb;border:1px solid #fde68a;border-radius:13px;padding:15px 18px;margin-top:14px}
.note-title{font-size:.7em;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#b45309;margin-bottom:9px;display:flex;align-items:center;gap:5px}
.note-row{font-size:.79em;color:#78350f;line-height:1.9;padding:1px 0;border-bottom:1px dashed #fde68a}
.note-row:last-child{border-bottom:none}

/* ── Role picker (差旅身份选择) ── */
.role-picker{display:flex;gap:10px;margin-bottom:22px;background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:10px}
.role-btn{flex:1;padding:14px 10px;border-radius:12px;font-size:.84em;font-weight:700;cursor:pointer;border:1.5px solid transparent;background:transparent;color:var(--text-2);transition:all .18s;text-align:center;line-height:1.4}
.role-btn .rb-icon{display:block;font-size:22px;margin-bottom:4px}
.role-btn .rb-label{display:block}
.role-btn .rb-sub{display:block;font-size:.75em;font-weight:500;color:var(--text-3);margin-top:2px}
.role-btn.active-cn{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.role-btn.active-global{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.role-btn:hover:not(.active-cn):not(.active-global){background:var(--white);border-color:var(--border);color:var(--text)}
.role-panel{display:none}
.role-panel.visible{display:block}
.role-hint{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:11px;padding:11px 14px;margin-bottom:16px;font-size:.81em;color:#166534;line-height:1.7}
/* Region cards (Global 报销/预订) */
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(max-width:580px){.region-grid{grid-template-columns:1fr}}
.region-card{display:flex;flex-direction:column;background:var(--white);border:1px solid var(--border);border-radius:13px;padding:14px 16px;text-decoration:none;color:var(--text);font-size:.82em;transition:all .16s}
.region-card:hover{border-color:var(--brand-border);box-shadow:0 3px 12px rgba(79,70,229,.1)}
.region-card .rc-region{font-weight:800;color:var(--brand);margin-bottom:4px}
.region-card .rc-name{font-size:.88em;color:var(--text-2);font-weight:500}
.region-card .rc-arr{margin-top:8px;font-size:11px;color:var(--text-3)}
.region-card:hover .rc-arr{color:var(--brand)}
/* ── Mobile ── */
.mob-bar{display:none;position:fixed;top:0;left:0;right:0;height:54px;background:var(--white);border-bottom:1px solid var(--border);z-index:20;padding:0 16px;align-items:center;justify-content:space-between}
.mob-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:.93em}
.mob-logo .ml-icon{width:30px;height:30px;background:var(--brand);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px}
.mob-btn{background:var(--brand-bg);border:1.5px solid var(--brand-border);border-radius:10px;padding:8px 13px;cursor:pointer;font-size:22px;color:var(--brand);line-height:1;font-weight:700}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:15}
.mob-overlay.open{display:block}
/* Mobile tab bar */
.mob-tabs{display:none;position:fixed;top:54px;left:0;right:0;height:58px;background:var(--white);border-bottom:1px solid var(--border);z-index:19;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mob-tabs::-webkit-scrollbar{display:none}
.mob-tabs-inner{display:flex;align-items:center;padding:0 10px;height:100%;gap:4px;width:max-content}
.mob-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:10px;border:none;background:none;cursor:pointer;min-width:52px;font-size:.68em;color:var(--text-2);font-weight:600;white-space:nowrap;transition:all .15s}
.mob-tab .mt-icon{font-size:20px;line-height:1}
.mob-tab.active{background:var(--brand-bg);color:var(--brand)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .24s;z-index:16}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding-top:112px}
  .content{padding:22px 18px 60px}
  .mob-bar{display:flex}
  .mob-tabs{display:block}
  .page-hd h2{font-size:1.45em}
}
</style>
</head>
<body>

<div class="mob-bar">
  <div class="mob-logo"><div class="ml-icon">📋</div>IEG Global</div>
  <button class="mob-btn" onclick="toggleSb()">☰</button>
</div>
<div class="mob-tabs" id="mob-tabs"><div class="mob-tabs-inner" id="mob-tabs-inner"></div></div>
<div class="mob-overlay" id="mob-ov" onclick="toggleSb()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">📋</div>
    <div class="sb-logo-text"><h1>IEG Global</h1><p>Admin Manual</p></div>
  </div>
  <div class="sb-lang">
    <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
  </div>
  <div class="sb-search">
    <div class="sb-search-wrap">
      <svg class="sb-search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜索..." oninput="doSearch()">
    </div>
  </div>
  <nav class="sb-nav" id="nav"></nav>
  <div class="sb-footer">
    <div class="sb-footer-box">
      <div class="sf-title" id="sf-title">Need Help?</div>
      <div class="sf-body" id="sf-body">通过企业微信联系对应职能负责人处理紧急事务</div>
    </div>
  </div>
</aside>

<div class="main"><div class="content" id="content"></div></div>

/* ── Helpers ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function t(obj, key){ return (obj[lang] && obj[lang][key]) ? obj[lang][key] : (obj.zh[key] || ''); }
function rawT(obj, key){ return (obj[lang] && obj[lang][key]) ? obj[lang][key] : (obj.zh[key] || ''); }

/* ── Role state (for travel picker) ── */

/* ── Build step list helper ── */
function buildStepList(steps){
  if(!steps || !steps.length) return '';
  var h = '<ul class="step-list">';
  steps.forEach(function(step, i){
    var text = lang==='en' ? step.en : step.zh;
    h += '<li class="step-item"><div class="step-num">'+(i+1)+'</div><div class="step-body">'+text+'</div></li>';
  });
  h += '</ul>';
  return h;
}

/* ── Mobile tabs ── */
function buildMobTabs(){
  var el = document.getElementById('mob-tabs-inner');
  if(!el) return;
  el.innerHTML = SECTIONS.map(function(s){
    var active = s.id === activeId;
    return '<button class="mob-tab'+(active?' active':'')+'" onclick="switchTo(\''+s.id+'\')">' +
      '<span class="mt-icon">'+s.icon+'</span>' +
      '<span>'+esc(t(s,'title'))+'</span>' +
    '</button>';
  }).join('');
  var activeBtn = el.querySelector('.mob-tab.active');
  if(activeBtn) activeBtn.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

/* ── Fuzzy search helper ── */
function sectionMatchesSearch(s, q) {
  if (!q) return true;
  var lower = q.toLowerCase();
  // search title
  if ((t(s,'title')||'').toLowerCase().indexOf(lower) >= 0) return true;
  // search welcome
  if (s.welcome) {
    if ((t(s.welcome,'title')||'').toLowerCase().indexOf(lower) >= 0) return true;
    if ((t(s.welcome,'desc')||'').toLowerCase().indexOf(lower) >= 0) return true;
  }
  // search contacts
  if (s.contacts) {
    for (var ci=0;ci<s.contacts.length;ci++) {
      var c = s.contacts[ci];
      if ((t(c,'name')||'').toLowerCase().indexOf(lower) >= 0) return true;
      if ((t(c,'desc')||'').toLowerCase().indexOf(lower) >= 0) return true;
    }
  }
  // search scenarios
  if (s.scenarios) {
    for (var si=0;si<s.scenarios.length;si++) {
      var sc = s.scenarios[si];
      var qObj = sc.q; var qText = ((qObj[lang]||qObj.zh)||'');
      if (qText.toLowerCase().indexOf(lower) >= 0) return true;
      if (sc.steps) {
        for (var sti=0;sti<sc.steps.length;sti++) {
          var st = sc.steps[sti];
          var stText = (lang==='en'?st.en:st.zh)||'';
          if (stText.toLowerCase().indexOf(lower) >= 0) return true;
        }
      }
    }
  }
  return false;
}

/* ── Nav ── */
function buildNav(){
  var nav = document.getElementById('nav');
  // When searching, show matching scenarios as sub-items
  if(searchQ){
    var items = [];
    SECTIONS.forEach(function(s){
      var matchScenarios = [];
      if(s.scenarios){
        s.scenarios.forEach(function(sc, sci){
          var lower = searchQ.toLowerCase();
          var qObj = sc.q; var qText = (qObj[lang]||qObj.zh||'');
          var hit = qText.toLowerCase().indexOf(lower) >= 0;
          if(!hit && sc.steps){ sc.steps.forEach(function(st){ if(((lang==='en'?st.en:st.zh)||'').toLowerCase().indexOf(lower)>=0) hit=true; }); }
          if(hit) matchScenarios.push({sc:sc, sci:sci, id:'sc-'+s.id+'-'+sci});
        });
      }
      var sectionHit = sectionMatchesSearch(s, searchQ);
      if(sectionHit || matchScenarios.length){
        var sIcon = s.icon||'📄'; var sTitle = (lang==='en'?s.en.title:s.zh.title)||'';
        var activeClass = (activeId===s.id)?' active':'';
        var subs = '';
        if(matchScenarios.length){
          subs = '<div class="nav-sub-list">';
          matchScenarios.forEach(function(m){
            var subQ = (m.sc.q[lang]||m.sc.q.zh||'');
            var shortQ = subQ.length>28 ? subQ.substring(0,28)+'…' : subQ;
            subs += '<div class="nav-sub-item" onclick="jumpToScenario(\''+s.id+'\',\''+m.id+'\')" title="'+subQ+'">'+shortQ+'</div>';
          });
          subs += '</div>';
        }
        items.push('<div class="nav-item'+activeClass+'" onclick="nav(\''+s.id+'\')"><span class="ni-icon">'+sIcon+'</span><span class="ni-title">'+sTitle+'</span></div>'+subs);
      }
    });
    nav.innerHTML = items.join('');
    return;
  }
  nav.innerHTML = SECTIONS.map(function(s){
    var active = s.id === activeId;
    return '<button class="nav-item'+(active?' active':'')+'" onclick="switchTo(\''+s.id+'\')">'+
      '<span class="ni-icon">'+s.icon+'</span>'+
      '<span class="ni-text">'+esc(t(s,'title'))+'</span>'+
      '<span class="ni-arrow">›</span>'+
    '</button>';
  }).join('');
}

  searchQ = document.getElementById('searchInput').value;
  buildNav();
}

function jumpToScenario(sectionId, anchorId){
  activeId = sectionId;
  buildNav();
  buildContent();
  setTimeout(function(){
    var el = document.getElementById(anchorId);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.style.transition='background .3s';
      el.style.background='#eef2ff';
      setTimeout(function(){ el.style.background=''; }, 1500);
    }
  }, 80);
}
function toggleSb(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mob-ov').classList.toggle('open');
}

buildNav();
buildContent();
buildMobTabs();
</script>
</body>
