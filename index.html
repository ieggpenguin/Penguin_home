<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEG Global · 企鹅岛生活指南</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brand:#4f46e5;--brand-light:#eef2ff;--brand-mid:#a5b4fc}
body{background:#f1f5f9;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;color:#1e293b;min-height:100vh}

/* ── Header ── */
header{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:30;box-shadow:0 1px 12px rgba(0,0,0,.06)}
.hd-inner{max-width:1100px;margin:0 auto;padding:16px 20px 12px}
.hd-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.logo{width:48px;height:48px;background:var(--brand);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 8px 20px rgba(79,70,229,.35)}
.hd-title{font-size:1.25em;font-weight:900;letter-spacing:-.03em;line-height:1.2}
.hd-sub{font-size:.75em;color:#94a3b8;margin-top:2px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.tab{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:50px;font-size:.83em;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#64748b;transition:all .18s;white-space:nowrap;user-select:none}
.tab .tab-icon{font-size:15px}
.tab:hover{border-color:var(--brand-mid);color:var(--brand);background:var(--brand-light)}
.tab.active{background:var(--brand);color:white;border-color:var(--brand);box-shadow:0 4px 14px rgba(79,70,229,.3)}
.lang-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.lang-btn{padding:6px 14px;border-radius:50px;font-size:.78em;font-weight:700;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#64748b;transition:all .18s;letter-spacing:.03em}
.lang-btn:hover{border-color:var(--brand-mid);color:var(--brand)}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
.search-wrap input{width:100%;padding:11px 16px 11px 44px;background:#f1f5f9;border:1.5px solid transparent;border-radius:14px;font-size:.88em;outline:none;color:#1e293b;transition:all .18s}
.search-wrap input:focus{background:white;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(165,180,252,.2)}

/* ── Main ── */
main{max-width:1100px;margin:0 auto;padding:20px}
.tab-pane{display:none}
.tab-pane.active{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;align-items:start}

/* ── Category Card ── */
.cat-card{background:white;border-radius:20px;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);transition:box-shadow .2s}
.cat-card:hover{box-shadow:0 8px 28px rgba(79,70,229,.1)}
.cat-hd{padding:20px;cursor:pointer;position:relative;overflow:hidden;user-select:none;transition:filter .15s}
.cat-hd:hover{filter:brightness(1.06)}
.cat-hd .deco{position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:rgba(255,255,255,.12);border-radius:50%;transition:transform .3s}
.cat-hd:hover .deco{transform:scale(1.3)}
.cat-hd.c-brand{background:linear-gradient(135deg,var(--brand),#818cf8);box-shadow:0 6px 20px rgba(79,70,229,.25)}
.cat-hd.c-emerald{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 6px 20px rgba(16,185,129,.2)}
.cat-hd.c-dark{background:linear-gradient(135deg,#0f172a,#1e3a5f);box-shadow:0 6px 20px rgba(15,23,42,.2)}
.cat-hd.c-amber{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 6px 20px rgba(245,158,11,.2)}
.cat-hd-inner{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.cat-icon-wrap{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cat-info{margin-left:12px;flex:1}
.cat-name{color:white;font-weight:800;font-size:.95em;line-height:1.3}
.cat-name-en{color:rgba(255,255,255,.65);font-size:.68em;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.cat-cnt{color:rgba(255,255,255,.7);font-size:.72em;margin-top:2px}
.cat-arrow{color:rgba(255,255,255,.8);font-size:18px;transition:transform .25s;flex-shrink:0}
.cat-arrow.open{transform:rotate(180deg)}
.cat-desc{color:rgba(255,255,255,.8);font-size:.77em;margin-top:10px;line-height:1.5;position:relative;z-index:1}

/* ── Item List ── */
.item-list{display:none;background:#f8fafc;padding:10px;max-height:560px;overflow-y:auto}
.item-list.open{display:block}
.item-list::-webkit-scrollbar{width:4px}
.item-list::-webkit-scrollbar-track{background:transparent}
.item-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
a.item{display:block;background:white;border-radius:14px;border:1px solid #e2e8f0;padding:14px;margin-bottom:8px;text-decoration:none;color:inherit;transition:all .18s;position:relative}
a.item:last-child{margin-bottom:0}
a.item:hover{border-color:var(--brand-mid);transform:translateX(4px);box-shadow:0 4px 16px rgba(79,70,229,.1)}
.item-name{font-weight:700;font-size:.88em;color:#1e293b;margin-bottom:2px;line-height:1.4;padding-right:20px}
a.item:hover .item-name{color:var(--brand)}
.item-name-en{font-size:.73em;color:#94a3b8;font-style:italic;margin-bottom:7px;line-height:1.3}
.item-desc{font-size:.75em;color:#64748b;margin-bottom:7px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.tag{padding:2px 8px;border-radius:7px;font-size:.69em;font-weight:600;white-space:nowrap}
.tag-cat{background:#eef2ff;color:#4338ca}
.tag-price{background:#f0fdf4;color:#059669}
.tag-fac{background:#fff7ed;color:#b45309}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.meta-full{grid-column:1/-1}
.meta span{display:flex;align-items:center;gap:4px;font-size:.72em;color:#64748b;line-height:1.7}
.ext{position:absolute;top:14px;right:14px;color:#cbd5e1;font-size:11px;font-weight:700}
a.item:hover .ext{color:var(--brand-mid)}

/* ── Footer ── */
footer{max-width:1100px;margin:16px auto 40px;text-align:center;color:#94a3b8;font-size:.77em;padding:0 20px}
.hidden{display:none}
.empty{padding:30px;text-align:center;color:#94a3b8;font-size:.83em}

@media(max-width:640px){
  .tab-pane.active{grid-template-columns:1fr}
  .hd-title{font-size:1.05em}
}
</style>

// EN is same structure, just with different display text — we swap name fields dynamically

function n(obj) { return (lang==='en' && obj.nameEn) ? obj.nameEn : obj.name; }
function loc(obj) { return (lang==='en' && obj.locationEn) ? obj.locationEn : obj.location; }
function dist(obj) { return (lang==='en' && obj.distanceEn) ? obj.distanceEn : obj.distance; }
function cat(obj) { return (lang==='en' && obj.categoryEn) ? obj.categoryEn : obj.category; }
function desc(obj) { return (lang==='en' && obj.descriptionEn) ? obj.descriptionEn : (obj.description||''); }
function rooms(obj) { return (lang==='en' && obj.roomsEn) ? obj.roomsEn : (obj.rooms||''); }
function fac(obj) { return (lang==='en' && obj.facilitiesEn) ? obj.facilitiesEn : (obj.facilities||''); }

function matches(obj) {
  if (!searchQ) return true;
  var q = searchQ.toLowerCase();
  var fields = [obj.name, obj.nameEn, obj.location, obj.locationEn, obj.category, obj.categoryEn, obj.description, obj.descriptionEn, obj.facilities, obj.facilitiesEn];
  return fields.some(function(f){ return f && f.toLowerCase().indexOf(q) >= 0; });
}

function dpUrl(name) { return 'https://m.dianping.com/shoplist/search?from=m_search&keyword=' + encodeURIComponent(name); }
function bingUrl(name) { return 'https://www.bing.com/search?q=' + encodeURIComponent(name + ' 携程'); }
function funUrl(name) { return 'https://www.bing.com/search?q=' + encodeURIComponent(name + ' 深圳'); }
function teamUrl(name) { return 'https://www.bing.com/search?q=' + encodeURIComponent(name + ' 团建'); }

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderHotel(h) {
  return '<a class="item" href="' + bingUrl(h.name) + '" target="_blank" rel="noopener">' +
    '<div class="ext">↗</div>' +
    '<div class="item-name">' + esc(n(h)) + '</div>' +
    (lang==='zh' && h.nameEn ? '<div class="item-name-en">' + esc(h.nameEn) + '</div>' : '') +
    '<div class="meta">' +
      '<span>📍 ' + esc(loc(h)) + '</span>' +
      '<span>🚗 ' + esc(dist(h)) + '</span>' +
      '<span class="meta-full">💴 ¥' + esc(h.price) + '</span>' +
    '</div>' +
  '</a>';
}

function renderRestaurant(r) {
  return '<a class="item" href="' + dpUrl(r.name) + '" target="_blank" rel="noopener">' +

    (lang==='zh' && r.nameEn ? '<div class="item-name-en">' + esc(r.nameEn) + '</div>' : '') +

    '<div class="tags">' +

      '<span class="tag tag-price">¥' + r.avgPrice + '/人</span>' +
    '</div>' +
    '<div class="meta">' +
      '<span>📍 ' + esc(loc(r)) + '</span>' +
      '<span>🚗 ' + esc(dist(r)) + '</span>' +
      (rooms(r) ? '<span class="meta-full">🚪 包间: ' + esc(rooms(r)) + '</span>' : '') +
    '</div>' +
  '</a>';
}

function buildPane(tabId, cfg, dataset, renderFn) {
  var el = document.getElementById('pane-' + tabId);
  el.innerHTML = '';
  cfg.cats.forEach(function(catCfg) {
    var items = dataset.filter(function(d){ return cfg.filter(d, catCfg.id) && matches(d); });
    var isOpen = expandedCat[tabId] === catCfg.id;
    var card = document.createElement('div');
    card.className = 'cat-card';
    var catLabel = (lang==='en') ? catCfg.nameEn : catCfg.name;
    var catDesc  = (lang==='en') ? catCfg.descEn : catCfg.desc;
    var noRes = (lang==='en') ? 'No results' : '暂无匹配结果';
    var itemWord = (lang==='en') ? ' items' : ' 个推荐';
    card.innerHTML =
      '<div class="cat-hd ' + catCfg.cls + '" onclick="toggleCat(\'' + tabId + '\',\'' + catCfg.id + '\')">' +
        '<div class="deco"></div>' +
        '<div class="cat-hd-inner">' +
          '<div class="cat-icon-wrap">' + catCfg.icon + '</div>' +
          '<div class="cat-info">' +
            '<div class="cat-name">' + esc(catLabel) + '</div>' +
            '<div class="cat-cnt">' + items.length + itemWord + '</div>' +
          '</div>' +
          '<div class="cat-arrow' + (isOpen?' open':'') + '" id="arr-' + tabId + '-' + catCfg.id + '">▼</div>' +
        '</div>' +
        (isOpen ? '<div class="cat-desc">' + esc(catDesc) + '</div>' : '') +
      '</div>' +
      '<div class="item-list' + (isOpen?' open':'') + '" id="list-' + tabId + '-' + catCfg.id + '">' +
        (items.length ? items.map(renderFn).join('') : '<div class="empty">' + noRes + '</div>') +
      '</div>';
    el.appendChild(card);
  });
}

function rebuild() {
  var cfg = I18N.zh;
  buildPane('hotel', cfg.hotel, HOTELS, renderHotel);
  buildPane('dining', cfg.dining, RESTAURANTS, renderRestaurant);
  buildPane('fun', cfg.fun, FUN_SPOTS, renderFun);
  buildPane('team', cfg.team, TEAM_BUILDING, renderTeam);
}

function toggleCat(tabId, catId) {
  // close all in this tab
  document.querySelectorAll('[id^="list-' + tabId + '-"]').forEach(function(el){ el.classList.remove('open'); });
  document.querySelectorAll('[id^="arr-' + tabId + '-"]').forEach(function(el){ el.classList.remove('open'); });
  if (expandedCat[tabId] === catId) {
    expandedCat[tabId] = null;
  } else {
    expandedCat[tabId] = catId;
    var list = document.getElementById('list-' + tabId + '-' + catId);
    var arr  = document.getElementById('arr-'  + tabId + '-' + catId);
    if (list) list.classList.add('open');
    if (arr)  arr.classList.add('open');
  }
  // re-render to update desc visibility
  rebuild();
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('pane-' + name).classList.add('active');
  currentTab = name;
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.getElementById('lang-btn').textContent = lang==='zh' ? 'EN' : '中文';
  document.getElementById('hd-title').textContent = lang==='zh' ? 'IEG Global · 企鹅岛生活指南' : 'IEG Global · Penguin Island Guide';
  document.getElementById('hd-sub').textContent = lang==='zh' ? '入驻企鹅岛，开启高效生活新篇章' : 'Your complete guide to living & working on Penguin Island';
  document.getElementById('searchInput').placeholder = lang==='zh' ? '搜索名称、地点或类别...' : 'Search name, location or category...';
  document.getElementById('ft-tip').textContent = lang==='zh' ? '✅ 点击卡片跳转大众点评 / 必应搜索查看详情' : '✅ Click any card to search on Dianping / Bing';
  document.getElementById('ft-copy').textContent = lang==='zh' ? 'IEG Global · 企鹅岛入驻专属指南 | 2026年3月' : 'IEG Global · Penguin Island Exclusive Guide | March 2026';
  var tabLabels = {
    zh: ['酒店住宿','餐饮美食','休闲娱乐','会议团建'],
    en: ['Hotels','Dining','Leisure','Team Building']
  };
  var tabIds = ['hotel','dining','fun','team'];
  tabIds.forEach(function(id, i) {
    var btn = document.querySelector('[onclick*="\'' + id + '\'"]');
    if (btn) btn.querySelector('.tab-lbl').textContent = tabLabels[lang][i];
  });
  rebuild();
}

function doSearch() {
  searchQ = document.getElementById('searchInput').value;
  rebuild();
  // auto-expand cats with results when searching
  if (searchQ) {
    ['hotel','dining','fun','team'].forEach(function(tabId) {
      document.querySelectorAll('[id^="list-' + tabId + '-"]').forEach(function(el) {
        if (el.querySelector('.item')) {
          el.classList.add('open');
          var catId = el.id.replace('list-' + tabId + '-', '');
          var arr = document.getElementById('arr-' + tabId + '-' + catId);
          if (arr) arr.classList.add('open');
        }
      });
    });
  }
}

// init
rebuild();
